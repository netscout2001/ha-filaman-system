name: "FilaMan System"
version: "v1.1.20-2"
slug: filaman_system_app
description: "A filament management system for 3D printing with spool tracking, AMS integration, and multi-user support."
url: https://github.com/netscout2001/ha-filaman-system
panel_icon: mdi:printer-3d
panel_title: FilaMan
arch:
  - amd64
  - aarch64
startup: services
init: false
ports:
  8000/tcp: 8000
  8443/tcp: 8443
options:
  ssl: false
  certfile: fullchain.pem
  keyfile: privkey.pem
map:
  - ssl
schema:
  ssl: bool
  certfile: str
  keyfile: str
ports_description:
  8000/tcp: "Web interface port (direct access). If another add-on uses this host port, HA will show an error."
  8443/tcp: "Secure Web interface port (direct access). If another add-on uses this host port, HA will show an error."
watchdog: "http://[HOST]:[PORT:8000]/health"
webui: "http://[HOST]:[PORT:8000]"
